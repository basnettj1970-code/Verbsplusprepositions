<body>
<div class="app">
  <h2 class="sr-only">French verb and infinitive preposition practice — choose à, de, or no preposition</h2>
  <div class="header">
    <h1>Verbe + infinitif</h1>
    <p id="hsub">Which preposition links each verb to the infinitive that follows?</p>
  </div>

  <div id="landing">
    <p class="intro">Choose your level to start:</p>
    <div class="level-cards">
      <button class="level-btn lv-c" onclick="startQuiz('common')">
        <div style="flex:1"><span class="lname">Common verbs</span><span class="ldesc">Essential verbs every student needs — ideal for regular retrieval practice</span></div>
        <span class="lbadge lbadge-c">Foundation</span>
      </button>
      <button class="level-btn lv-l" onclick="startQuiz('less-common')">
        <div style="flex:1"><span class="lname">Less common verbs</span><span class="ldesc">More sophisticated vocabulary for the highest grades</span></div>
        <span class="lbadge lbadge-l">Advanced</span>
      </button>
      <button class="level-btn lv-a" onclick="startQuiz('all')">
        <div style="flex:1"><span class="lname">All verbs</span><span class="ldesc">The complete challenge — common and advanced mixed together</span></div>
        <span class="lbadge lbadge-a">Full list</span>
      </button>
    </div>
  </div>

  <div id="quiz" style="display:none;">
    <button class="back-btn" onclick="goBack()">← Change level</button>
    <div class="stats">
      <div class="stat stat-c"><div class="sl">correct</div><div class="sv" id="score">0</div></div>
      <div class="stat stat-a"><div class="sl">attempted</div><div class="sv" id="attempted">0</div></div>
      <div class="stat stat-s"><div class="sl">streak</div><div class="sv" id="streak">0</div></div>
    </div>
    <div class="card" id="card"></div>
    <div class="choices">
      <button class="choice-btn btn-a" onclick="answer('à')">à</button>
      <button class="choice-btn btn-de" onclick="answer('de')">de</button>
      <button class="choice-btn btn-rien" onclick="answer('rien')">rien</button>
    </div>
    <div class="feedback" id="feedback" style="display:none;"></div>
    <button class="next-btn" id="next-btn" onclick="nextVerb()">Verbe suivant →</button>
    <div class="progress"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
</div>

function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';} 
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

let pool=[],queue=[],current=null,score=0,attempted=0,streak=0,answered=false;

function startQuiz(lv){
  pool=lv==='all'?[...V]:V.filter(v=>v.lv===lv);
  score=0;attempted=0;streak=0;
  ['score','attempted','streak'].forEach(id=>document.getElementById(id).textContent='0');
  document.getElementById('landing').style.display='none';
  document.getElementById('quiz').style.display='block';
  const lbl={common:'Common verbs','less-common':'Less common verbs',all:'All verbs'};
  document.getElementById('hsub').textContent=lbl[lv]+' — which preposition follows?';
  document.getElementById('feedback').style.display='none';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('progress-fill').style.width='0%';
  refill();nextVerb();
}

function goBack(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('landing').style.display='block';
  document.getElementById('hsub').textContent='Which preposition links each verb to the infinitive that follows?';
  document.getElementById('progress-fill').style.width='0%';
}

function refill(){queue=shuffle([...pool]);}

function nextVerb(){
  if(!queue.length)refill();
  current=queue.pop();answered=false;
  renderCard();
  document.getElementById('feedback').style.display='none';
  document.getElementById('next-btn').style.display='none';
  document.querySelectorAll('.choice-btn').forEach(b=>{b.disabled=false;b.classList.remove('reveal','incorrect');});
  updateProgress();
}

function renderCard(){
  const card=document.getElementById('card');
  if(current.dual){
    const parts=current.sent.split('___');
    card.innerHTML=`<div class="verb-label">Read the sentence — which preposition fits?</div>
      <div class="ctx-tag">context sentence</div>
      <div class="ctx-sent">${esc(parts[0])}<span class="blank"></span>${esc(parts[1]||'')}</div>
      <div class="ctx-en">${esc(current.sentEn)}</div>
      <div class="ctx-verb">verb: <em>${esc(current.v)}</em></div>`;
  } else {
    card.innerHTML=`<div class="verb-label">verb + ___ + infinitive</div>
      <div class="verb">${esc(current.v)}</div>
      <div class="verb-meaning">${esc(current.m)}</div>`;
  }
}

function answer(choice){
  if(answered)return;
  answered=true;attempted++;
  const ok=choice===current.p;
  if(ok){score++;streak++;}else{streak=0;}
  document.getElementById('score').textContent=score;
  document.getElementById('attempted').textContent=attempted;
  document.getElementById('streak').textContent=streak;
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled=true;
    const v=b.textContent.trim();
    if(v===current.p)b.classList.add('reveal');
    if(v===choice&&!ok)b.classList.add('incorrect');
  });
  const fb=document.getElementById('feedback');
  fb.style.display='block';
  fb.className='feedback '+(ok?'fb-ok':'fb-no');
  const rt=ok?'✓ Correct!':`✗ Not quite — the answer is ${current.p==='rien'?'no preposition':'"'+current.p+'"'}`;
  fb.innerHTML=`<div class="fr ${ok?'ok':'no'}">${rt}</div><div class="fex">${current.ex}<br><em>${current.tr}</em></div>`;
  document.getElementById('next-btn').style.display='block';
  updateProgress();
}

function updateProgress(){
  document.getElementById('progress-fill').style.width=Math.min(100,(attempted%pool.length)/pool.length*100)+'%';
}
</script>
